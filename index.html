<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIARMAP - Pardoseli industriale armate cu mase plastice reciclate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0;font-family:serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var { useState, useMemo, useRef, useEffect, useCallback } = React;

var GEOMETRIES = {
  cylindrical: { name: "Cilindrica (referinta)", desc: "Fibra dreapta cu sectiune circulara", params: [{ key: "length", label: "Lungime (mm)", default: 20, min: 5, max: 60 },{ key: "diameter", label: "Diametru (mm)", default: 0.6, min: 0.1, max: 2, step: 0.1 }], color: "#808080", improvements: { compressive: 0, flexural: 0, tensile: 0, energy: 0 }, refs: "Referinta de baza" },
  crimped: { name: "Ondulata (crimped)", desc: "Profil sinusoidal", params: [{ key: "length", label: "Lungime (mm)", default: 25, min: 10, max: 60 },{ key: "diameter", label: "Diametru (mm)", default: 0.75, min: 0.2, max: 2, step: 0.1 },{ key: "amplitude", label: "Amplitudine (mm)", default: 1.5, min: 0.5, max: 4, step: 0.1 },{ key: "waves", label: "Nr. ondulatii", default: 4, min: 2, max: 10 }], color: "#FF7F00", improvements: { compressive: 44.8, flexural: 29, tensile: 15, energy: 120 }, refs: "Gribniak et al. 2023" },
  hooked: { name: "Cu carlig (hooked-end)", desc: "Capete indoite - ancorare puternica", params: [{ key: "length", label: "Lungime (mm)", default: 30, min: 15, max: 60 },{ key: "diameter", label: "Diametru (mm)", default: 0.55, min: 0.2, max: 1.5, step: 0.05 },{ key: "hookAngle", label: "Unghi carlig (deg)", default: 146, min: 90, max: 180 },{ key: "hookLength", label: "Lungime carlig (mm)", default: 3, min: 1, max: 8, step: 0.5 }], color: "#2166AC", improvements: { compressive: 13, flexural: 42, tensile: 20, energy: 150 }, refs: "Lee et al. 2024" },
  spiral: { name: "Spiralata 3D (optimizata)", desc: "Geometrie optima Altair Inspire", params: [{ key: "length", label: "Lungime (mm)", default: 20, min: 10, max: 40 },{ key: "diameter", label: "Diametru fir (mm)", default: 0.5, min: 0.2, max: 1.5, step: 0.1 },{ key: "helixDiam", label: "Diametru spirala (mm)", default: 3, min: 1, max: 8, step: 0.5 },{ key: "pitch", label: "Pas spirala (mm)", default: 4, min: 1, max: 10, step: 0.5 }], color: "#E41A1C", improvements: { compressive: 12, flexural: 30, tensile: 25, energy: 200 }, refs: "PIARMAP - Altair Inspire" },
  band: { name: "Banda rugoasa", desc: "Sectiune dreptunghiulara rugoasa", params: [{ key: "length", label: "Lungime (mm)", default: 20, min: 10, max: 50 },{ key: "width", label: "Latime (mm)", default: 2, min: 0.5, max: 5, step: 0.1 },{ key: "thickness", label: "Grosime (mm)", default: 0.5, min: 0.1, max: 2, step: 0.1 }], color: "#4DAF4A", improvements: { compressive: 8, flexural: 18, tensile: 12, energy: 80 }, refs: "PIARMAP" },
  sika_micro: { name: "SikaFiber-12 (micro)", desc: "Monofilament PP 12mm, EN 14889-2", params: [{ key: "length", label: "Lungime (mm)", default: 12, min: 6, max: 19 },{ key: "diameter", label: "Diametru (mm)", default: 0.032, min: 0.018, max: 0.05, step: 0.001 }], color: "#9467BD", improvements: { compressive: 2, flexural: 5, tensile: 8, energy: 30 }, refs: "Sika: 0,6-1,0 kg/m3", dosageRange: "0,6-1,0 kg/m3" },
  sika_fibermesh300: { name: "Sika Fibermesh-300", desc: "PP fibrilat 19mm", params: [{ key: "length", label: "Lungime (mm)", default: 19, min: 12, max: 38 },{ key: "diameter", label: "Diametru (mm)", default: 0.4, min: 0.24, max: 0.64, step: 0.01 }], color: "#8C564B", improvements: { compressive: 3, flexural: 8, tensile: 10, energy: 40 }, refs: "Sika: 0,9-1,8 kg/m3", dosageRange: "0,9-1,8 kg/m3" },
  sika_force48: { name: "SikaFiber Force-48", desc: "Macro poliolefin 48mm structural", params: [{ key: "length", label: "Lungime (mm)", default: 48, min: 38, max: 54 },{ key: "diameter", label: "Diametru (mm)", default: 0.7, min: 0.5, max: 1.0, step: 0.05 }], color: "#D62728", improvements: { compressive: 5, flexural: 25, tensile: 18, energy: 150 }, refs: "SikaFiber: 3-10 kg/m3", dosageRange: "3-10 kg/m3" },
};

function calcVolume(type, p) {
  if (type === 'band') return p.length * p.width * p.thickness;
  if (type === 'crimped') return Math.PI * Math.pow(p.diameter / 2, 2) * p.length * 1.15;
  if (type === 'hooked') return Math.PI * Math.pow(p.diameter / 2, 2) * (p.length + 2 * (p.hookLength || 3));
  return Math.PI * Math.pow((p.diameter || 0.5) / 2, 2) * (p.length || 20);
}

var DISCL = "Atentie: Prezenta simulare este pur orientativa. In realitate, volumul disponibil pentru dispersia fibrelor este semnificativ redus de prezenta agregatelor (pietris, nisip), care ocupa 60-75% din volumul betonului. Fibrele se pot distribui doar in pasta de ciment din spatiile interstitiale. Rezultatele trebuie validate experimental.";

function MonteCarloSim({ fiberType, fiberParams }) {
  var canvasRef = useRef(null);
  var [specimen, setSpecimen] = useState('prism');
  var [slabH, setSlabH] = useState(250);
  var [vf, setVf] = useState(0.3);
  var [flowAlign, setFlowAlign] = useState(0);
  var [rotX, setRotX] = useState(-25);
  var [rotY, setRotY] = useState(35);
  var [seed, setSeed] = useState(1);
  var dragRef = useRef({ dragging: false, lastX: 0, lastY: 0 });
  var dims = specimen === 'prism' ? { x: 100, y: 100, z: 400, label: "Epruveta 100x100x400 mm (EN 14651)" } : { x: 1000, y: 1000, z: slabH, label: "Pardoseala " + slabH + " mm (1x1 m)" };
  var fiberLen = fiberParams.length || 20;
  var fiberVol = calcVolume(fiberType, fiberParams);
  var nFibers = Math.min(400, Math.round((vf / 100) * dims.x * dims.y * dims.z / fiberVol));
  var rng = useCallback(function(s) { var x = Math.sin(s * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }, []);
  var fibers = useMemo(function() {
    var arr = [];
    for (var i = 0; i < nFibers; i++) {
      var s = seed * 1000 + i;
      var cx = (rng(s*3)*0.8+0.1)*dims.x, cy = (rng(s*3+1)*0.8+0.1)*dims.y, cz = (rng(s*3+2)*0.8+0.1)*dims.z;
      var theta, phi;
      if (flowAlign > 0) { theta = Math.abs(rng(s*5+3)-0.5)*2*(1-flowAlign)*Math.PI/2; phi = rng(s*5+4)*Math.PI*2; }
      else { theta = Math.acos(2*rng(s*5+3)-1); phi = rng(s*5+4)*Math.PI*2; }
      var half = fiberLen/2;
      arr.push({ cx:cx, cy:cy, cz:cz, dx:half*Math.sin(theta)*Math.cos(phi), dy:half*Math.sin(theta)*Math.sin(phi), dz:half*Math.cos(theta), theta:theta });
    }
    return arr;
  }, [nFibers, dims.x, dims.y, dims.z, fiberLen, flowAlign, seed, rng]);
  useEffect(function() {
    var canvas = canvasRef.current; if (!canvas) return;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    var scale = Math.min(W, H) / (Math.max(dims.x, dims.y, dims.z) * 2.2);
    var cxC = W/2, cyC = H/2;
    var cosXr = Math.cos(rotX*Math.PI/180), sinXr = Math.sin(rotX*Math.PI/180);
    var cosYr = Math.cos(rotY*Math.PI/180), sinYr = Math.sin(rotY*Math.PI/180);
    function project(x,y,z) { x-=dims.x/2; y-=dims.y/2; z-=dims.z/2; var x1=x*cosYr-z*sinYr, z1=x*sinYr+z*cosYr, y1=y*cosXr-z1*sinXr, z2=y*sinXr+z1*cosXr; var p=800/(800+z2); return [cxC+x1*scale*p, cyC+y1*scale*p, z2]; }
    var corners=[[0,0,0],[dims.x,0,0],[dims.x,dims.y,0],[0,dims.y,0],[0,0,dims.z],[dims.x,0,dims.z],[dims.x,dims.y,dims.z],[0,dims.y,dims.z]];
    var edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    var proj=corners.map(function(c){return project(c[0],c[1],c[2]);});
    ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
    edges.forEach(function(e){ctx.beginPath();ctx.moveTo(proj[e[0]][0],proj[e[0]][1]);ctx.lineTo(proj[e[1]][0],proj[e[1]][1]);ctx.stroke();});
    ctx.fillStyle='#999'; ctx.font='11px serif';
    var xe=project(dims.x*1.12,0,0); ctx.fillText('X',xe[0],xe[1]);
    var ye=project(0,dims.y*1.12,0); ctx.fillText('Y',ye[0],ye[1]);
    var ze=project(0,0,dims.z*1.12); ctx.fillText('Z',ze[0],ze[1]);
    var fd=fibers.map(function(f){return Object.assign({},f,{depth:project(f.cx,f.cy,f.cz)[2]});}).sort(function(a,b){return a.depth-b.depth;});
    fd.forEach(function(f){
      var p1=project(f.cx-f.dx,f.cy-f.dy,f.cz-f.dz), p2=project(f.cx+f.dx,f.cy+f.dy,f.cz+f.dz);
      var a=Math.abs(Math.cos(f.theta));
      ctx.strokeStyle='rgba('+Math.round(220*(1-a)+30*a)+','+Math.round(50*(1-a)+100*a)+','+Math.round(50*(1-a)+220*a)+',0.7)';
      ctx.lineWidth=Math.max(1,2*(800/(800+f.depth))); ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    });
    ctx.fillStyle='#333'; ctx.font='bold 11px serif'; ctx.fillText(dims.label,10,18);
    ctx.font='10px serif'; ctx.fillStyle='#666'; ctx.fillText('N='+nFibers+' fibre | Vf='+vf.toFixed(2)+'% | Flux: '+(flowAlign*100).toFixed(0)+'%',10,34);
    var grd=ctx.createLinearGradient(W-130,H-20,W-20,H-20); grd.addColorStop(0,'rgb(220,50,50)'); grd.addColorStop(1,'rgb(30,100,220)');
    ctx.fillStyle=grd; ctx.fillRect(W-130,H-25,110,10); ctx.fillStyle='#666'; ctx.font='9px serif'; ctx.fillText('perpendicular',W-130,H-28); ctx.fillText('aliniat',W-40,H-28);
  }, [fibers, rotX, rotY, dims, nFibers, vf, flowAlign]);
  function onMD(e){dragRef.current={dragging:true,lastX:e.clientX,lastY:e.clientY};}
  function onMM(e){if(!dragRef.current.dragging)return;setRotY(function(p){return p+(e.clientX-dragRef.current.lastX)*0.5;});setRotX(function(p){return Math.max(-89,Math.min(89,p+(e.clientY-dragRef.current.lastY)*0.5));});dragRef.current.lastX=e.clientX;dragRef.current.lastY=e.clientY;}
  function onMU(){dragRef.current.dragging=false;}
  var avgTheta=fibers.length?(fibers.reduce(function(s,f){return s+f.theta*180/Math.PI;},0)/fibers.length).toFixed(1):'0';
  var efficiency=fibers.length?(fibers.reduce(function(s,f){return s+Math.pow(Math.cos(f.theta),2);},0)/fibers.length*100).toFixed(1):'0';
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-2">
        <button onClick={function(){setSpecimen('prism');}} className={"p-2 rounded-lg border-2 text-sm font-medium "+(specimen==='prism'?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200')}>Epruveta EN 14651</button>
        <button onClick={function(){setSpecimen('slab');}} className={"p-2 rounded-lg border-2 text-sm font-medium "+(specimen==='slab'?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200')}>Pardoseala industriala</button>
      </div>
      {specimen==='slab'&&<div><label className="text-xs text-gray-500">Grosime h (mm): {slabH}</label><input type="range" min={150} max={500} step={10} value={slabH} onChange={function(e){setSlabH(parseInt(e.target.value));}} className="w-full"/></div>}
      <div className="grid grid-cols-2 gap-2">
        <div><label className="text-xs text-gray-500">Vf: {vf.toFixed(2)}%</label><input type="range" min={0.05} max={1.5} step={0.05} value={vf} onChange={function(e){setVf(parseFloat(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Aliniere flux: {(flowAlign*100).toFixed(0)}%</label><input type="range" min={0} max={0.95} step={0.05} value={flowAlign} onChange={function(e){setFlowAlign(parseFloat(e.target.value));}} className="w-full"/></div>
      </div>
      <div className="border rounded-lg overflow-hidden bg-white cursor-grab active:cursor-grabbing" onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}>
        <canvas ref={canvasRef} width={560} height={380} className="w-full" style={{touchAction:'none'}}/>
      </div>
      <div className="flex gap-2">
        <button onClick={function(){setSeed(function(s){return s+1;});}} className="flex-1 bg-gray-100 hover:bg-gray-200 rounded-lg py-1.5 text-sm">Regenereaza</button>
        <button onClick={function(){setRotX(-25);setRotY(35);}} className="bg-gray-100 hover:bg-gray-200 rounded-lg px-3 py-1.5 text-sm">Reset</button>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <div className="bg-blue-50 rounded-lg p-2 text-center"><div className="text-xs text-blue-600">Fibre</div><div className="text-lg font-bold text-blue-800">{nFibers}</div></div>
        <div className="bg-green-50 rounded-lg p-2 text-center"><div className="text-xs text-green-600">Eficienta</div><div className="text-lg font-bold text-green-800">{efficiency}%</div><div className="text-xs text-green-500">(vs 33% aleator)</div></div>
        <div className="bg-orange-50 rounded-lg p-2 text-center"><div className="text-xs text-orange-600">Unghi mediu</div><div className="text-lg font-bold text-orange-800">{avgTheta} deg</div></div>
      </div>
      <div className="bg-amber-50 border border-amber-300 rounded-lg p-3 text-xs text-amber-800">{DISCL}</div>
      <p className="text-xs text-gray-400 italic">Trage cu mouse-ul pentru rotire 3D. Albastru=aliniat, rosu=perpendicular.</p>
    </div>);
}

function WestergaardSim() {
  var [h, setH] = useState(200);
  var [P, setP] = useState(60);
  var [k, setK] = useState(40);
  var [Ec, setEc] = useState(30000);
  var [aPlate, setAPlate] = useState(100);
  var [MR, setMR] = useState(4.5);
  var [fiberBoost, setFiberBoost] = useState(0);

  var mu = 0.20;
  var h_m = h / 1000;
  var l = Math.pow((Ec * 1e6 * Math.pow(h_m, 3)) / (12 * (1 - mu * mu) * k * 1e6), 0.25) * 1000;
  var aRadius = Math.sqrt(aPlate * aPlate / Math.PI);
  var b = Math.min(aRadius, 1.724 * h);
  var MR_eff = MR * (1 + fiberBoost / 100);

  var sigma_i = 0.316 * P * 1000 / (h * h) * (4 * Math.log10(l / b) + 1.069);
  var sigma_e = 0.572 * P * 1000 / (h * h) * (4 * Math.log10(l / b) + 0.359);
  var sigma_c = 3 * P * 1000 / (h * h) * (1 - Math.pow(aRadius * 1.414 / l, 0.6));
  var FS_i = MR_eff / sigma_i;
  var FS_e = MR_eff / sigma_e;
  var delta_i = P * 1000 / (8 * k * l * l) * 1000;

  var safeColor = function(fs) { return fs >= 2 ? '#16a34a' : fs >= 1.5 ? '#ca8a04' : '#dc2626'; };

  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Grosime placa h (mm): {h}</label><input type="range" min={100} max={400} step={10} value={h} onChange={function(e){setH(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Forta picior raft P (kN): {P}</label><input type="range" min={10} max={120} step={5} value={P} onChange={function(e){setP(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Coef. reactiune k (MN/m3): {k}</label><input type="range" min={10} max={100} step={5} value={k} onChange={function(e){setK(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">E beton (MPa): {Ec}</label><input type="range" min={20000} max={40000} step={1000} value={Ec} onChange={function(e){setEc(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Placa picior raft (mm): {aPlate}</label><input type="range" min={50} max={250} step={10} value={aPlate} onChange={function(e){setAPlate(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">MR beton (MPa): {MR}</label><input type="range" min={3} max={7} step={0.1} value={MR} onChange={function(e){setMR(parseFloat(e.target.value));}} className="w-full"/></div>
      </div>
      <div><label className="text-xs text-gray-500">Crestere MR datorita fibrelor (%): +{fiberBoost}%</label><input type="range" min={0} max={50} step={5} value={fiberBoost} onChange={function(e){setFiberBoost(parseInt(e.target.value));}} className="w-full"/></div>

      <div className="bg-gray-50 rounded-lg p-3 text-sm">
        <div className="font-bold text-gray-700 mb-2">Parametri calculati</div>
        <div className="grid grid-cols-2 gap-1 text-xs">
          <div>Raza rigiditate relativa l = <b>{l.toFixed(1)} mm</b></div>
          <div>Raza contact echivalenta a = <b>{aRadius.toFixed(1)} mm</b></div>
          <div>MR efectiv = <b>{MR_eff.toFixed(2)} MPa</b></div>
          <div>Deformatie interioara = <b>{delta_i.toFixed(2)} mm</b></div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2">
        <div className="rounded-lg p-3 text-center" style={{backgroundColor: safeColor(FS_i) + '15', borderLeft: '4px solid ' + safeColor(FS_i)}}>
          <div className="text-xs text-gray-600">Interior</div>
          <div className="text-sm font-bold">{sigma_i.toFixed(2)} MPa</div>
          <div className="text-lg font-bold" style={{color: safeColor(FS_i)}}>FS = {FS_i.toFixed(2)}</div>
        </div>
        <div className="rounded-lg p-3 text-center" style={{backgroundColor: safeColor(FS_e) + '15', borderLeft: '4px solid ' + safeColor(FS_e)}}>
          <div className="text-xs text-gray-600">Margine</div>
          <div className="text-sm font-bold">{sigma_e.toFixed(2)} MPa</div>
          <div className="text-lg font-bold" style={{color: safeColor(FS_e)}}>FS = {FS_e.toFixed(2)}</div>
        </div>
        <div className="rounded-lg p-3 text-center" style={{backgroundColor: safeColor(MR_eff/sigma_c) + '15', borderLeft: '4px solid ' + safeColor(MR_eff/sigma_c)}}>
          <div className="text-xs text-gray-600">Colt</div>
          <div className="text-sm font-bold">{sigma_c.toFixed(2)} MPa</div>
          <div className="text-lg font-bold" style={{color: safeColor(MR_eff/sigma_c)}}>FS = {(MR_eff/sigma_c).toFixed(2)}</div>
        </div>
      </div>
      <div className="text-xs text-gray-500">Verde: FS &ge; 2.0 (sigur) | Galben: 1.5-2.0 (limita) | Rosu: &lt; 1.5 (nesigur)</div>

      <div className="bg-blue-50 rounded-lg p-3 text-xs">
        <div className="font-bold text-blue-700 mb-1">Formule Westergaard (1926)</div>
        <div>Interior: sigma = 0.316*P/h2 * [4*log(l/b) + 1.069]</div>
        <div>Margine: sigma = 0.572*P/h2 * [4*log(l/b) + 0.359]</div>
        <div>l = [Ec*h3 / (12*(1-mu2)*k)]^(1/4)</div>
        <div className="mt-1">Ref: ACI 360R-10, Westergaard 1926</div>
      </div>
    </div>);
}

function FiberSVG({type,params,color}) {
  var w=300,h=90,cy=h/2,shape=null;
  if(type==='crimped'){var amp=Math.min(20,(params.amplitude||1.5)*10);var nw=params.waves||4;var d='M 30 '+cy;for(var i=0;i<nw;i++){var sw=240/nw;d+=' Q '+(30+i*sw+sw*0.25)+' '+(cy-amp)+' '+(30+i*sw+sw*0.5)+' '+cy+' Q '+(30+i*sw+sw*0.75)+' '+(cy+amp)+' '+(30+(i+1)*sw)+' '+cy;}shape=<path d={d} fill="none" stroke={color} strokeWidth={3}/>;}
  else if(type==='hooked'){shape=<polyline points={"30,"+(cy-12)+" 30,"+cy+" 270,"+cy+" 270,"+(cy+12)} fill="none" stroke={color} strokeWidth={3} strokeLinecap="round" strokeLinejoin="round"/>;}
  else if(type==='spiral'){var sa=Math.min(25,(params.helixDiam||3)*4),turns=(params.length||20)/(params.pitch||4);var sd='M 30 '+cy;for(var j=1;j<=60;j++){var t=j/60;sd+=' L '+(30+t*240)+' '+(cy+sa*Math.sin(t*turns*2*Math.PI));}shape=<path d={sd} fill="none" stroke={color} strokeWidth={3}/>;}
  else if(type==='band'){shape=<rect x={30} y={cy-8} width={240} height={16} fill={color} opacity={0.2} stroke={color} strokeWidth={1.5}/>;}
  else{shape=<rect x={30} y={cy-3} width={240} height={6} fill={color} opacity={0.3} stroke={color} strokeWidth={1.5} rx={3}/>;}
  return <svg viewBox={"0 0 "+w+" "+h} className="w-full" style={{maxHeight:'90px'}}>{shape}</svg>;
}

function BarChart({data,maxVal,label}){return(<div className="space-y-1"><div className="text-xs font-medium text-gray-500">{label}</div>{data.map(function(d,i){return(<div key={i} className="flex items-center gap-2"><div className="w-20 text-xs text-right truncate">{d.label}</div><div className="flex-1 bg-gray-100 rounded-full h-4 relative"><div className="h-4 rounded-full transition-all duration-500" style={{width:Math.max(2,(d.value/maxVal)*100)+'%',backgroundColor:d.color}}/><span className="absolute right-2 top-0 text-xs leading-4 font-medium">+{d.value.toFixed(1)}%</span></div></div>);})}</div>);}

function App() {
  var [selectedType, setSelectedType] = useState('spiral');
  var [params, setParams] = useState({});
  var [vf, setVf] = useState(0.35);
  var [page, setPage] = useState('home');
  var geo = GEOMETRIES[selectedType];
  useMemo(function(){var d={};geo.params.forEach(function(p){d[p.key]=p.default;});setParams(d);},[selectedType]);
  var fiberVolMm3=calcVolume(selectedType,params);
  var massPerFiber=fiberVolMm3*1e-9*910*1e6;
  var nFibersPerM3=(vf/100)/(fiberVolMm3*1e-9);
  var nFibersPerSpec=(vf/100)*0.004/(fiberVolMm3*1e-9);
  var massPerM3=nFibersPerM3*massPerFiber/1e6;
  var massPerSpec=nFibersPerSpec*massPerFiber/1e3;
  var imp=geo.improvements;

  if(page==='home') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
      <header className="bg-white border-b shadow-sm"><div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between"><div><h1 className="text-xl font-bold text-gray-800">PIARMAP</h1><p className="text-xs text-gray-500">Grant ARUST 29 - GNaC ARUT-UTCB-29/2023</p></div><span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">v3.0</span></div></header>
      <main className="max-w-4xl mx-auto px-4 py-8">
        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-2">Pardoseli industriale armate cu mase plastice reciclate</h2>
          <p className="text-sm text-gray-500 mb-3">Interactiunea cu terenul de fundare</p>
          <p className="text-sm text-gray-600">Proiectul PIARMAP studiaza aplicabilitatea betoanelor armate cu materiale plastice reciclate in pardoselile industriale, cu accent pe <strong>influenta formei geometrice</strong> a armaturilor disperse.</p>
        </div>
        <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Instrumente dezvoltate</h3>
        <div className="bg-white rounded-xl shadow-lg p-5 cursor-pointer hover:shadow-xl border-l-4 border-blue-500 mb-3" onClick={function(){setPage('calculator');}}>
          <div className="flex items-start gap-4"><div className="w-11 h-11 bg-blue-100 rounded-lg flex items-center justify-center text-lg font-bold text-blue-600">1</div>
          <div className="flex-1"><h3 className="font-bold text-gray-800">Calculator geometrie fibre</h3><p className="text-sm text-gray-500 mt-1">8 tipuri (incl. Sika) - dimensiuni, dozaj, beneficii</p><span className="text-xs text-blue-600 mt-1 inline-block">Deschide &rarr;</span></div></div>
        </div>
        <div className="bg-white rounded-xl shadow-lg p-5 cursor-pointer hover:shadow-xl border-l-4 border-red-500 mb-3" onClick={function(){setPage('montecarlo');}}>
          <div className="flex items-start gap-4"><div className="w-11 h-11 bg-red-100 rounded-lg flex items-center justify-center text-lg font-bold text-red-600">2</div>
          <div className="flex-1"><h3 className="font-bold text-gray-800">Dispersie Monte Carlo 3D</h3><p className="text-sm text-gray-500 mt-1">Simulare interactiva - epruveta si pardoseala h=15...50cm</p><span className="text-xs text-red-600 mt-1 inline-block">Deschide &rarr;</span></div></div>
        </div>
        <div className="bg-white rounded-xl shadow-lg p-5 cursor-pointer hover:shadow-xl border-l-4 border-green-500 mb-3" onClick={function(){setPage('westergaard');}}>
          <div className="flex items-start gap-4"><div className="w-11 h-11 bg-green-100 rounded-lg flex items-center justify-center text-lg font-bold text-green-600">3</div>
          <div className="flex-1"><h3 className="font-bold text-gray-800">Simulator pardoseala-teren (Westergaard)</h3><p className="text-sm text-gray-500 mt-1">Calcul tensiuni, factor de siguranta, influenta fibrelor PFRC</p><span className="text-xs text-green-600 mt-1 inline-block">Deschide &rarr;</span></div></div>
        </div>
        <footer className="mt-8 text-center text-xs text-gray-400">UTCB - ARUST 29 - 2025-2026</footer>
      </main></div>);

  if(page==='montecarlo') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-red-50">
      <header className="bg-white border-b shadow-sm"><div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3"><button onClick={function(){setPage('home');}} className="text-blue-600 hover:text-blue-800 text-sm">&larr; PIARMAP</button><span className="text-gray-300">|</span><h1 className="text-sm font-bold text-gray-700">Dispersie Monte Carlo 3D</h1></div></header>
      <main className="max-w-5xl mx-auto px-4 py-4">
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
          <div className="lg:col-span-2 space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-2">Tip fibra</h2><select value={selectedType} onChange={function(e){setSelectedType(e.target.value);}} className="w-full border rounded-lg p-2 text-sm">{Object.entries(GEOMETRIES).map(function(entry){return <option key={entry[0]} value={entry[0]}>{entry[1].name}</option>;})}</select><div className="mt-2 border rounded-lg p-2 bg-gray-50"><FiberSVG type={selectedType} params={params} color={geo.color}/></div><div className="mt-2 space-y-2">{geo.params.map(function(p){return(<div key={p.key}><label className="text-xs text-gray-500">{p.label}</label><div className="flex items-center gap-2"><input type="range" min={p.min} max={p.max} step={p.step||1} value={params[p.key]||p.default} onChange={function(e){var np=Object.assign({},params);np[p.key]=parseFloat(e.target.value);setParams(np);}} className="flex-1"/><span className="text-xs font-mono w-12 text-right">{params[p.key]||p.default}</span></div></div>);})}</div></div></div>
          <div className="lg:col-span-3"><div className="bg-white rounded-xl shadow p-4"><MonteCarloSim fiberType={selectedType} fiberParams={params}/></div></div>
        </div>
        <div className="mt-4 bg-white rounded-xl shadow p-4"><h3 className="text-sm font-bold text-gray-700 mb-2">Formulele Monte Carlo</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs text-gray-600"><div className="bg-gray-50 rounded-lg p-3"><div className="font-bold text-gray-700 mb-1">Pozitie</div><div className="font-mono">x ~ U(Lf/2, Lx-Lf/2)</div><div className="font-mono">y ~ U(Lf/2, Ly-Lf/2)</div></div><div className="bg-gray-50 rounded-lg p-3"><div className="font-bold text-gray-700 mb-1">Orientare pe sfera</div><div className="font-mono">theta = arccos(2u-1)</div><div className="font-mono">phi ~ U(0, 2*pi)</div></div><div className="bg-gray-50 rounded-lg p-3"><div className="font-bold text-gray-700 mb-1">Eficienta</div><div className="font-mono">eta = cos2(theta)</div><div className="font-mono">eta_mediu = 1/3</div></div></div></div>
      </main></div>);

  if(page==='westergaard') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-green-50">
      <header className="bg-white border-b shadow-sm"><div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3"><button onClick={function(){setPage('home');}} className="text-blue-600 hover:text-blue-800 text-sm">&larr; PIARMAP</button><span className="text-gray-300">|</span><h1 className="text-sm font-bold text-gray-700">Simulator pardoseala-teren (Westergaard)</h1></div></header>
      <main className="max-w-3xl mx-auto px-4 py-4">
        <div className="bg-white rounded-xl shadow p-4 mb-4">
          <p className="text-sm text-gray-600 mb-3">Calculeaza tensiunile Westergaard in placa de pardoseala sub actiunea picioarelor de raft si factorul de siguranta. Ajusteaza parametrii si observa efectul armarii cu fibre (cresterea MR).</p>
          <WestergaardSim/>
        </div>
      </main></div>);

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
      <header className="bg-white border-b shadow-sm"><div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3"><button onClick={function(){setPage('home');}} className="text-blue-600 hover:text-blue-800 text-sm">&larr; PIARMAP</button><span className="text-gray-300">|</span><h1 className="text-sm font-bold text-gray-700">Calculator geometrie fibre</h1></div></header>
      <main className="max-w-5xl mx-auto px-4 py-4"><div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">1. Geometria</h2><div className="space-y-1.5">{Object.entries(GEOMETRIES).map(function(entry){var k=entry[0],g=entry[1];return(<button key={k} onClick={function(){setSelectedType(k);}} className={"w-full text-left p-2.5 rounded-lg border-2 text-sm "+(selectedType===k?'border-blue-500 bg-blue-50':'border-gray-200 hover:border-gray-300')}><div className="font-medium" style={{color:g.color}}>{g.name}</div><div className="text-xs text-gray-500">{g.desc}</div></button>);})}</div></div></div>
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">2. Dimensiuni</h2><div className="space-y-3">{geo.params.map(function(p){return(<div key={p.key}><label className="text-xs text-gray-500">{p.label}</label><div className="flex items-center gap-2"><input type="range" min={p.min} max={p.max} step={p.step||1} value={params[p.key]||p.default} onChange={function(e){var np=Object.assign({},params);np[p.key]=parseFloat(e.target.value);setParams(np);}} className="flex-1"/><span className="text-sm font-mono w-12 text-right">{params[p.key]||p.default}</span></div></div>);})}
        <div><label className="text-xs text-gray-500">Vf (%)</label><div className="flex items-center gap-2"><input type="range" min={0.1} max={1.5} step={0.05} value={vf} onChange={function(e){setVf(parseFloat(e.target.value));}} className="flex-1"/><span className="text-sm font-mono w-12 text-right">{vf.toFixed(2)}%</span></div></div></div></div>
        <div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-2">3. Vizualizare</h2><div className="border rounded-lg p-2 bg-gray-50"><FiberSVG type={selectedType} params={params} color={geo.color}/></div><p className="text-xs text-gray-400 mt-2 italic">{geo.refs}</p></div></div>
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">4. Dozaj</h2><div className="space-y-3">
          <div className="bg-blue-50 rounded-lg p-3"><div className="text-xs text-blue-600 font-medium">Per metru cub</div><div className="text-lg font-bold text-blue-800">{Math.round(nFibersPerM3).toLocaleString()} fibre</div><div className="text-sm text-blue-700">{massPerM3.toFixed(2)} kg/m3</div></div>
          <div className="bg-green-50 rounded-lg p-3"><div className="text-xs text-green-600 font-medium">Per epruveta (100x100x400 mm)</div><div className="text-lg font-bold text-green-800">{Math.round(nFibersPerSpec).toLocaleString()} fibre</div><div className="text-sm text-green-700">{massPerSpec.toFixed(1)} g</div></div>
          <div className="bg-gray-50 rounded-lg p-3 text-xs space-y-1"><div className="flex justify-between"><span>Vol. fibra:</span><span>{fiberVolMm3.toFixed(2)} mm3</span></div><div className="flex justify-between"><span>Masa/fibra:</span><span>{massPerFiber.toFixed(1)} mg</span></div></div>
          {geo.dosageRange&&<div className="bg-purple-50 border border-purple-200 rounded-lg p-3"><div className="text-xs text-purple-700 font-medium">Dozaj Sika recomandat</div><div className="text-sm font-bold text-purple-800 mt-1">{geo.dosageRange}</div><div className="text-xs text-purple-600">Calculat: {massPerM3.toFixed(2)} kg/m3</div></div>}
        </div></div>
        <div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">5. Beneficii estimate</h2>
          <BarChart data={[{label:'Compresiune',value:imp.compressive*(vf/0.3),color:'#2166AC'},{label:'Incovoiere',value:imp.flexural*(vf/0.3),color:'#4DAF4A'},{label:'Intindere',value:imp.tensile*(vf/0.3),color:'#FF7F00'},{label:'En. post-fis.',value:imp.energy*(vf/0.3),color:'#E41A1C'}]} maxVal={300} label={"La Vf="+vf.toFixed(2)+"%"}/>
          <p className="text-xs text-gray-400 mt-2 italic">* Valori estimate din literatura.</p></div>
        <div className="bg-amber-50 border border-amber-300 rounded-lg p-3 text-xs text-amber-800">{DISCL}</div>
        </div>
      </div></main></div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
