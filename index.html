  sika_micro: { name: "SikaFiber-12 (micro)", desc: "Monofilament PP 12mm, EN 14889-2", params: [{ key: "length", label: "Lungime (mm)", "default": 12, min: 6, max: 19 },{ key: "diameter", label: "Diametru (mm)", "default": 0.032, min: 0.018, max: 0.05, step: 0.001 }], color: "#9467BD", improvements: { compressive: 2, flexural: 5, tensile: 8, energy: 30 }, refs: "Sika: 0,6-1,0 kg/m3", dosageRange: "0,6-1,0 kg/m3" },
  sika_fibermesh300: { name: "Sika Fibermesh-300", desc: "PP fibrilat 19mm", params: [{ key: "length", label: "Lungime (mm)", "default": 19, min: 12, max: 38 },{ key: "diameter", label: "Diametru (mm)", "default": 0.4, min: 0.24, max: 0.64, step: 0.01 }], color: "#8C564B", improvements: { compressive: 3, flexural: 8, tensile: 10, energy: 40 }, refs: "Sika: 0,9-1,8 kg/m3", dosageRange: "0,9-1,8 kg/m3" },
  sika_force48: { name: "SikaFiber Force-48", desc: "Macro poliolefin 48mm structural", params: [{ key: "length", label: "Lungime (mm)", "default": 48, min: 38, max: 54 },{ key: "diameter", label: "Diametru (mm)", "default": 0.7, min: 0.5, max: 1.0, step: 0.05 }], color: "#D62728", improvements: { compressive: 5, flexural: 25, tensile: 18, energy: 150 }, refs: "SikaFiber: 3-10 kg/m3", dosageRange: "3-10 kg/m3" },
};
function calcVolume(type, p) {
  if (type === 'band') return p.length * p.width * p.thickness;
  if (type === 'crimped') return Math.PI * Math.pow(p.diameter / 2, 2) * p.length * 1.15;
  if (type === 'hooked') return Math.PI * Math.pow(p.diameter / 2, 2) * (p.length + 2 * (p.hookLength || 3));
  return Math.PI * Math.pow((p.diameter || 0.5) / 2, 2) * (p.length || 20);
}

// =================== 3D FIBER VIEWER ===================
function Fiber3DViewer({ fiberType, fiberParams, fiberColor }) {
  var canvasRef = useRef(null);
  var [rotX, setRotX] = useState(-20);
  var [rotY, setRotY] = useState(30);
  var [zoom, setZoom] = useState(1.0);
  var dragRef = useRef({ dragging: false, lastX: 0, lastY: 0 });

  function generateFiberPoints(type, p) {
    var pts = [];
    var L = p.length || 20;
    var n = 200;
    if (type === 'cylindrical' || type === 'sika_micro' || type === 'sika_fibermesh300' || type === 'sika_force48') {
      for (var i = 0; i <= n; i++) { var t = i / n; pts.push([t * L - L/2, 0, 0]); }
    } else if (type === 'crimped') {
      var amp = p.amplitude || 1.5;
      var waves = p.waves || 4;
      for (var i = 0; i <= n; i++) { var t = i / n; pts.push([t * L - L/2, amp * Math.sin(t * waves * 2 * Math.PI), 0]); }
    } else if (type === 'hooked') {
      var hl = p.hookLength || 3;
      pts.push([-L/2, -hl, 0]);
      pts.push([-L/2, 0, 0]);
      for (var i = 0; i <= n; i++) { var t = i / n; pts.push([t * L - L/2, 0, 0]); }
      pts.push([L/2, 0, 0]);
      pts.push([L/2, hl, 0]);
    } else if (type === 'spiral' || type === 'spiral_bulb') {
      var hd = (p.helixDiam || 3) / 2;
      var pitch = p.pitch || 4;
      var turns = L / pitch;
      for (var i = 0; i <= n; i++) { var t = i / n; var angle = t * turns * 2 * Math.PI; pts.push([t * L - L/2, hd * Math.cos(angle), hd * Math.sin(angle)]); }
    } else if (type === 'band') {
      var w = (p.width || 2) / 2;
      var th = (p.thickness || 0.5) / 2;
      // Draw outline of band
      pts.push([-L/2, -w, -th]); pts.push([L/2, -w, -th]); pts.push([L/2, w, -th]); pts.push([-L/2, w, -th]); pts.push([-L/2, -w, -th]);
      pts.push(null); // break
      pts.push([-L/2, -w, th]); pts.push([L/2, -w, th]); pts.push([L/2, w, th]); pts.push([-L/2, w, th]); pts.push([-L/2, -w, th]);
      pts.push(null);
      pts.push([-L/2, -w, -th]); pts.push([-L/2, -w, th]); pts.push(null);
      pts.push([L/2, -w, -th]); pts.push([L/2, -w, th]); pts.push(null);
      pts.push([L/2, w, -th]); pts.push([L/2, w, th]); pts.push(null);
      pts.push([-L/2, w, -th]); pts.push([-L/2, w, th]);
    } else if (type === 'zigzag') {
      var amp = p.amplitude || 2;
      var segs = p.segments || 6;
      for (var i = 0; i <= segs; i++) { var t = i / segs; pts.push([t * L - L/2, (i % 2 === 0 ? -1 : 1) * amp, 0]); }
    } else if (type === 'anchor') {
      var aw = (p.anchorWidth || 3) / 2;
      // Left T
      pts.push([-L/2, -aw, 0]); pts.push([-L/2, aw, 0]); pts.push(null);
      pts.push([-L/2, 0, 0]);
      for (var i = 0; i <= n; i++) { var t = i / n; pts.push([t * L - L/2, 0, 0]); }
      pts.push([L/2, 0, 0]); pts.push(null);
      // Right T
      pts.push([L/2, -aw, 0]); pts.push([L/2, aw, 0]);
    } else {
      for (var i = 0; i <= n; i++) { var t = i / n; pts.push([t * L - L/2, 0, 0]); }
    }
    return pts;
  }

  useEffect(function() {
    var canvas = canvasRef.current; if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var cosX = Math.cos(rotX * Math.PI / 180), sinX = Math.sin(rotX * Math.PI / 180);
    var cosY = Math.cos(rotY * Math.PI / 180), sinY = Math.sin(rotY * Math.PI / 180);
    var scale = zoom * Math.min(W, H) / ((fiberParams.length || 20) * 1.8);
    var cx = W / 2, cy = H / 2;

    function project(x, y, z) {
      var x1 = x * cosY - z * sinY;
      var z1 = x * sinY + z * cosY;
      var y1 = y * cosX - z1 * sinX;
      return [cx + x1 * scale, cy + y1 * scale];
    }

    // Draw grid
    ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
    var gSize = (fiberParams.length || 20) * 0.8;
    for (var g = -gSize; g <= gSize; g += gSize/4) {
      var p1 = project(g, 0, -gSize); var p2 = project(g, 0, gSize);
      ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
      p1 = project(-gSize, 0, g); p2 = project(gSize, 0, g);
      ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
    }

    // Draw axes
    var axLen = (fiberParams.length || 20) * 0.6;
    var o = project(0, 0, 0);
    var ax = project(axLen, 0, 0); var ay = project(0, axLen, 0); var az = project(0, 0, axLen);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(o[0], o[1]); ctx.lineTo(ax[0], ax[1]); ctx.stroke();
    ctx.strokeStyle = '#2ecc71'; ctx.beginPath(); ctx.moveTo(o[0], o[1]); ctx.lineTo(ay[0], ay[1]); ctx.stroke();
    ctx.strokeStyle = '#3498db'; ctx.beginPath(); ctx.moveTo(o[0], o[1]); ctx.lineTo(az[0], az[1]); ctx.stroke();
    ctx.font = '11px serif'; ctx.fillStyle = '#e74c3c'; ctx.fillText('X', ax[0] + 5, ax[1]);
    ctx.fillStyle = '#2ecc71'; ctx.fillText('Y', ay[0] + 5, ay[1]);
    ctx.fillStyle = '#3498db'; ctx.fillText('Z', az[0] + 5, az[1]);

    // Generate and draw fiber
    var pts = generateFiberPoints(fiberType, fiberParams);
    ctx.strokeStyle = fiberColor; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    var started = false;
    for (var i = 0; i < pts.length; i++) {
      if (pts[i] === null) { ctx.stroke(); ctx.beginPath(); started = false; continue; }
      var pp = project(pts[i][0], pts[i][1], pts[i][2]);
      if (!started) { ctx.moveTo(pp[0], pp[1]); started = true; } else { ctx.lineTo(pp[0], pp[1]); }
    }
    ctx.stroke();

    // Draw bulbs for spiral_bulb
    if (fiberType === 'spiral_bulb') {
      var bs = (fiberParams.bulbSize || 2) * scale * 0.5;
      var L = fiberParams.length || 20;
      var startP = project(-L/2, 0, 0);
      var endP = project(L/2, 0, 0);
      ctx.fillStyle = fiberColor + '88';
      ctx.beginPath(); ctx.arc(startP[0], startP[1], bs, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(endP[0], endP[1], bs, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }

    // Labels
    ctx.fillStyle = '#333'; ctx.font = 'bold 12px serif';
    ctx.fillText(GEOMETRIES[fiberType].name, 10, 20);
    ctx.font = '10px serif'; ctx.fillStyle = '#666';
    ctx.fillText('L = ' + (fiberParams.length || 20) + ' mm | d = ' + (fiberParams.diameter || fiberParams.width || 0.6) + ' mm', 10, 36);
    ctx.fillText('Rotire: trage cu mouse-ul | Zoom: slider', 10, H - 10);
  }, [fiberType, fiberParams, fiberColor, rotX, rotY, zoom]);

  function onMD(e) { dragRef.current = { dragging: true, lastX: e.clientX, lastY: e.clientY }; }
  function onMM(e) { if (!dragRef.current.dragging) return; setRotY(function(p) { return p + (e.clientX - dragRef.current.lastX) * 0.5; }); setRotX(function(p) { return Math.max(-89, Math.min(89, p + (e.clientY - dragRef.current.lastY) * 0.5)); }); dragRef.current.lastX = e.clientX; dragRef.current.lastY = e.clientY; }
  function onMU() { dragRef.current.dragging = false; }

  return (
    <div className="space-y-2">
      <div className="border rounded-lg overflow-hidden bg-white cursor-grab active:cursor-grabbing" onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}>
        <canvas ref={canvasRef} width={560} height={400} className="w-full" style={{ touchAction: 'none' }} />
      </div>
      <div className="flex items-center gap-3">
        <label className="text-xs text-gray-500">Zoom:</label>
        <input type="range" min={0.3} max={3} step={0.1} value={zoom} onChange={function(e) { setZoom(parseFloat(e.target.value)); }} className="flex-1" />
        <button onClick={function() { setRotX(-20); setRotY(30); setZoom(1); }} className="bg-gray-100 hover:bg-gray-200 rounded-lg px-3 py-1 text-sm">Reset</button>
      </div>
    </div>
  );
}

// =================== MONTE CARLO ===================
function MonteCarloSim({ fiberType, fiberParams }) {
  var canvasRef = useRef(null);
  var [specimen, setSpecimen] = useState('prism');
  var [slabH, setSlabH] = useState(250);
  var [vf, setVf] = useState(0.3);
  var [flowAlign, setFlowAlign] = useState(0);
  var [rotX, setRotX] = useState(-25);
  var [rotY, setRotY] = useState(35);
  var [seed, setSeed] = useState(1);
  var dragRef = useRef({ dragging: false, lastX: 0, lastY: 0 });
  var dims = specimen === 'prism' ? { x: 100, y: 100, z: 400, label: "Epruveta 100x100x400 mm (EN 14651)" } : { x: 1000, y: 1000, z: slabH, label: "Pardoseala " + slabH + " mm (1x1 m)" };
  var fiberLen = fiberParams.length || 20;
  var fiberVol = calcVolume(fiberType, fiberParams);
  var nFibers = Math.min(400, Math.round((vf / 100) * dims.x * dims.y * dims.z / fiberVol));
  var rng = useCallback(function(s) { var x = Math.sin(s * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }, []);
  var fibers = useMemo(function() {
    var arr = [];
    for (var i = 0; i < nFibers; i++) {
      var s = seed * 1000 + i;
      var cx = (rng(s*3)*0.8+0.1)*dims.x, cy = (rng(s*3+1)*0.8+0.1)*dims.y, cz = (rng(s*3+2)*0.8+0.1)*dims.z;
      var theta, phi;
      if (flowAlign > 0) { theta = Math.abs(rng(s*5+3)-0.5)*2*(1-flowAlign)*Math.PI/2; phi = rng(s*5+4)*Math.PI*2; }
      else { theta = Math.acos(2*rng(s*5+3)-1); phi = rng(s*5+4)*Math.PI*2; }
      var half = fiberLen/2;
      arr.push({ cx:cx, cy:cy, cz:cz, dx:half*Math.sin(theta)*Math.cos(phi), dy:half*Math.sin(theta)*Math.sin(phi), dz:half*Math.cos(theta), theta:theta });
    }
    return arr;
  }, [nFibers, dims.x, dims.y, dims.z, fiberLen, flowAlign, seed, rng]);
  useEffect(function() {
    var canvas = canvasRef.current; if (!canvas) return;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    var scale = Math.min(W, H) / (Math.max(dims.x, dims.y, dims.z) * 2.2);
    var cxC = W/2, cyC = H/2;
    var cosXr = Math.cos(rotX*Math.PI/180), sinXr = Math.sin(rotX*Math.PI/180);
    var cosYr = Math.cos(rotY*Math.PI/180), sinYr = Math.sin(rotY*Math.PI/180);
    function project(x,y,z) { x-=dims.x/2; y-=dims.y/2; z-=dims.z/2; var x1=x*cosYr-z*sinYr, z1=x*sinYr+z*cosYr, y1=y*cosXr-z1*sinXr, z2=y*sinXr+z1*cosXr; var p=800/(800+z2); return [cxC+x1*scale*p, cyC+y1*scale*p, z2]; }
    var corners=[[0,0,0],[dims.x,0,0],[dims.x,dims.y,0],[0,dims.y,0],[0,0,dims.z],[dims.x,0,dims.z],[dims.x,dims.y,dims.z],[0,dims.y,dims.z]];
    var edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    var proj=corners.map(function(c){return project(c[0],c[1],c[2]);});
    ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
    edges.forEach(function(e){ctx.beginPath();ctx.moveTo(proj[e[0]][0],proj[e[0]][1]);ctx.lineTo(proj[e[1]][0],proj[e[1]][1]);ctx.stroke();});
    var fd=fibers.map(function(f){return Object.assign({},f,{depth:project(f.cx,f.cy,f.cz)[2]});}).sort(function(a,b){return a.depth-b.depth;});
    fd.forEach(function(f){
      var p1=project(f.cx-f.dx,f.cy-f.dy,f.cz-f.dz), p2=project(f.cx+f.dx,f.cy+f.dy,f.cz+f.dz);
      var a=Math.abs(Math.cos(f.theta));
      ctx.strokeStyle='rgba('+Math.round(220*(1-a)+30*a)+','+Math.round(50*(1-a)+100*a)+','+Math.round(50*(1-a)+220*a)+',0.7)';
      ctx.lineWidth=Math.max(1,2*(800/(800+f.depth))); ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    });
    ctx.fillStyle='#333'; ctx.font='bold 11px serif'; ctx.fillText(dims.label,10,18);
    ctx.font='10px serif'; ctx.fillStyle='#666'; ctx.fillText('N='+nFibers+' | Vf='+vf.toFixed(2)+'% | Flux: '+(flowAlign*100).toFixed(0)+'%',10,34);
  }, [fibers, rotX, rotY, dims, nFibers, vf, flowAlign]);
  function onMD(e){dragRef.current={dragging:true,lastX:e.clientX,lastY:e.clientY};}
  function onMM(e){if(!dragRef.current.dragging)return;setRotY(function(p){return p+(e.clientX-dragRef.current.lastX)*0.5;});setRotX(function(p){return Math.max(-89,Math.min(89,p+(e.clientY-dragRef.current.lastY)*0.5));});dragRef.current.lastX=e.clientX;dragRef.current.lastY=e.clientY;}
  function onMU(){dragRef.current.dragging=false;}
  var avgTheta=fibers.length?(fibers.reduce(function(s,f){return s+f.theta*180/Math.PI;},0)/fibers.length).toFixed(1):'0';
  var efficiency=fibers.length?(fibers.reduce(function(s,f){return s+Math.pow(Math.cos(f.theta),2);},0)/fibers.length*100).toFixed(1):'0';
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-2">
        <button onClick={function(){setSpecimen('prism');}} className={"p-2 rounded-lg border-2 text-sm font-medium "+(specimen==='prism'?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200')}>Epruveta EN 14651</button>
        <button onClick={function(){setSpecimen('slab');}} className={"p-2 rounded-lg border-2 text-sm font-medium "+(specimen==='slab'?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200')}>Pardoseala industriala</button>
      </div>

      <div className="grid grid-cols-2 gap-2">

        <div><label className="text-xs text-gray-500">Aliniere: {(flowAlign*100).toFixed(0)}%</label><input type="range" min={0} max={0.95} step={0.05} value={flowAlign} onChange={function(e){setFlowAlign(parseFloat(e.target.value));}} className="w-full"/></div>

// =================== WESTERGAARD ===================
function WestergaardSim() {
  var [h, setH] = useState(200);
  var [P, setP] = useState(60);
  var [k, setK] = useState(40);
  var [Ec, setEc] = useState(30000);
  var [aPlate, setAPlate] = useState(100);
  var [MR, setMR] = useState(4.5);
  var [fiberBoost, setFiberBoost] = useState(0);
  var mu = 0.20;
  var h_m = h / 1000;
  var l = Math.pow((Ec * 1e6 * Math.pow(h_m, 3)) / (12 * (1 - mu * mu) * k * 1e6), 0.25) * 1000;
  var aRadius = Math.sqrt(aPlate * aPlate / Math.PI);
  var b = Math.min(aRadius, 1.724 * h);
  var MR_eff = MR * (1 + fiberBoost / 100);
  var sigma_i = 0.316 * P * 1000 / (h * h) * (4 * Math.log10(l / b) + 1.069);
  var sigma_e = 0.572 * P * 1000 / (h * h) * (4 * Math.log10(l / b) + 0.359);
  var sigma_c = 3 * P * 1000 / (h * h) * (1 - Math.pow(aRadius * 1.414 / l, 0.6));
  var delta_i = P * 1000 / (8 * k * l * l) * 1000;
  var safeColor = function(fs) { return fs >= 2 ? '#16a34a' : fs >= 1.5 ? '#ca8a04' : '#dc2626'; };
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Grosime h: {h} mm</label><input type="range" min={100} max={400} step={10} value={h} onChange={function(e){setH(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Forta P: {P} kN</label><input type="range" min={10} max={120} step={5} value={P} onChange={function(e){setP(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">k: {k} MN/m3</label><input type="range" min={10} max={100} step={5} value={k} onChange={function(e){setK(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Ec: {Ec} MPa</label><input type="range" min={20000} max={40000} step={1000} value={Ec} onChange={function(e){setEc(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">Placa raft: {aPlate} mm</label><input type="range" min={50} max={250} step={10} value={aPlate} onChange={function(e){setAPlate(parseInt(e.target.value));}} className="w-full"/></div>
        <div><label className="text-xs text-gray-500">MR: {MR} MPa</label><input type="range" min={3} max={7} step={0.1} value={MR} onChange={function(e){setMR(parseFloat(e.target.value));}} className="w-full"/></div>
      </div>
      <div><label className="text-xs text-gray-500">Crestere MR fibre: +{fiberBoost}%</label><input type="range" min={0} max={50} step={5} value={fiberBoost} onChange={function(e){setFiberBoost(parseInt(e.target.value));}} className="w-full"/></div>
      <div className="bg-gray-50 rounded-lg p-3 text-sm">
        <div className="font-bold text-gray-700 mb-2">Parametri calculati</div>
        <div className="grid grid-cols-2 gap-1 text-xs">
          <div>Raza rigiditate l = <b>{l.toFixed(1)} mm</b></div>
          <div>MR efectiv = <b>{MR_eff.toFixed(2)} MPa</b></div>
          <div>Deformatie = <b>{delta_i.toFixed(2)} mm</b></div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-2">
        {[['Interior', sigma_i, MR_eff/sigma_i], ['Margine', sigma_e, MR_eff/sigma_e], ['Colt', sigma_c, MR_eff/sigma_c]].map(function(item) {
          return <div key={item[0]} className="rounded-lg p-3 text-center" style={{backgroundColor: safeColor(item[2]) + '15', borderLeft: '4px solid ' + safeColor(item[2])}}>
            <div className="text-xs text-gray-600">{item[0]}</div>
            <div className="text-sm font-bold">{item[1].toFixed(2)} MPa</div>
            <div className="text-lg font-bold" style={{color: safeColor(item[2])}}>FS = {item[2].toFixed(2)}</div>
          </div>;
        })}
      </div>
      <div className="text-xs text-gray-500">Verde: FS &ge; 2.0 | Galben: 1.5-2.0 | Rosu: &lt; 1.5</div>
    </div>);
}

  var r=RET[clasa]; var adl=r.ci*r.ap1/100/1.05; var At=r.ap+(adl>3?adl:0); var agr=r.da*(1000-r.ci/r.dc-At-r.ae);
  var s04=agr*0.4,s48=agr*0.2,s816=agr*0.4; var dens=r.ci+agr+At; var vol=masa/dens; var s=vol;

  }

  function ParamSliders() {
    return <div className="space-y-2">{geo.params.map(function(p){return(<div key={p.key}><label className="text-xs text-gray-500">{p.label}</label><div className="flex items-center gap-2"><input type="range" min={p.min} max={p.max} step={p.step||1} value={params[p.key]||p.default} onChange={function(e){var np=Object.assign({},params);np[p.key]=parseFloat(e.target.value);setParams(np);}} className="flex-1"/><span className="text-xs font-mono w-12 text-right">{params[p.key]||p.default}</span></div></div>);})}</div>;
  }

  if(page==='home') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
      <header className="bg-white border-b shadow-sm"><div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between"><div><h1 className="text-xl font-bold text-gray-800">PIARMAP</h1><p className="text-xs text-gray-500">Grant ARUST 29 - GNaC ARUT-UTCB-29/2023</p></div><div className="flex items-center gap-2"><button onClick={function(){setLang(lang==='ro'?'en':'ro');}} className="text-xs border rounded-lg px-3 py-1.5 font-bold hover:bg-gray-100">{lang==='ro'?'EN':'RO'}</button><span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">v5.0</span></div></div></header>
      <main className="max-w-4xl mx-auto px-4 py-8">
        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-2">{t.title}</h2>
          <p className="text-sm text-gray-500 mb-3">{t.subtitle}</p>
          <p className="text-sm text-gray-600" dangerouslySetInnerHTML={{__html:t.desc}}/>
        </div>
        <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">{t.tools}</h3>
        {[
          {id:'inventory',num:'1',color:'border-purple-500',bg:'bg-purple-100',tc:'text-purple-600',title:t.inv,desc:t.invD},
          {id:'calculator',num:'2',color:'border-blue-500',bg:'bg-blue-100',tc:'text-blue-600',title:t.calc,desc:t.calcD},
          {id:'beton',num:'3',color:'border-amber-500',bg:'bg-amber-100',tc:'text-amber-600',title:t.beton,desc:t.betonD},
          {id:'montecarlo',num:'4',color:'border-red-500',bg:'bg-red-100',tc:'text-red-600',title:t.mc,desc:t.mcD},
          {id:'westergaard',num:'5',color:'border-green-500',bg:'bg-green-100',tc:'text-green-600',title:t.west,desc:t.westD},
        ].map(function(ti){return(
          <div key={ti.id} className={"bg-white rounded-xl shadow-lg p-5 cursor-pointer hover:shadow-xl border-l-4 "+ti.color+" mb-3"} onClick={function(){setPage(ti.id);}}>
            <div className="flex items-start gap-4"><div className={"w-11 h-11 "+ti.bg+" rounded-lg flex items-center justify-center text-lg font-bold "+ti.tc}>{ti.num}</div>
            <div className="flex-1"><h3 className="font-bold text-gray-800">{ti.title}</h3><p className="text-sm text-gray-500 mt-1">{ti.desc}</p><span className={"text-xs "+ti.tc+" mt-1 inline-block"}>{t.open} &rarr;</span></div></div>
          </div>);
        })}
        <footer className="mt-8 text-center text-xs text-gray-400">UTCB - ARUST 29 - 2025-2026 | Conf. dr. ing. Boti Ioan | Ing. Guran Stefan Alexandru</footer>
      </main></div>);

  if(page==='inventory') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-purple-50">
      <NavHeader title="Inventar forme 3D" />
      <main className="max-w-5xl mx-auto px-4 py-4">
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
          <div className="lg:col-span-2 space-y-3">
            <div className="bg-white rounded-xl shadow p-4">
              <h2 className="text-sm font-bold text-gray-700 mb-2">Selecteaza geometria</h2>
              <FiberSelect />
              <p className="text-xs text-gray-500 mt-2 italic">{geo.desc}</p>
              <div className="mt-3"><ParamSliders /></div>
            </div>
            <div className="bg-white rounded-xl shadow p-4">
              <h2 className="text-sm font-bold text-gray-700 mb-2">Proprietati</h2>
              <div className="space-y-1 text-xs">
                <div className="flex justify-between"><span>Volum fibra:</span><span className="font-mono">{fiberVolMm3.toFixed(2)} mm3</span></div>
                <div className="flex justify-between"><span>Masa/fibra:</span><span className="font-mono">{massPerFiber.toFixed(1)} mg</span></div>
                <div className="flex justify-between"><span>Referinta:</span><span className="italic">{geo.refs}</span></div>
              </div>
              {geo.dosageRange && <div className="mt-2 bg-purple-50 border border-purple-200 rounded-lg p-2"><div className="text-xs text-purple-700 font-medium">Dozaj Sika recomandat: {geo.dosageRange}</div></div>}
            </div>
          </div>
          <div className="lg:col-span-3"><div className="bg-white rounded-xl shadow p-4">
            <h2 className="text-sm font-bold text-gray-700 mb-2">Vizualizare 3D</h2>
            <Fiber3DViewer fiberType={selectedType} fiberParams={params} fiberColor={geo.color} />
          </div></div>
        </div>
      </main></div>);

  if(page==='montecarlo') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-red-50">
      <NavHeader title="Dispersie Monte Carlo 3D" />
      <main className="max-w-5xl mx-auto px-4 py-4">
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
          <div className="lg:col-span-2 space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-2">Tip fibra</h2><FiberSelect /><div className="mt-2"><ParamSliders /></div></div></div>
          <div className="lg:col-span-3"><div className="bg-white rounded-xl shadow p-4"><MonteCarloSim fiberType={selectedType} fiberParams={params}/></div></div>
        </div>
      </main></div>);

  if(page==='beton') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50">
      <NavHeader title={t.beton} />
      <main className="max-w-4xl mx-auto px-4 py-4"><BetonCalculator t={t}/></main></div>);

  if(page==='westergaard') return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-green-50">
      <NavHeader title="Simulator pardoseala-teren (Westergaard)" />
      <main className="max-w-3xl mx-auto px-4 py-4"><div className="bg-white rounded-xl shadow p-4"><WestergaardSim/></div></main></div>);

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
      <NavHeader title="Calculator geometrie fibre" />
      <main className="max-w-5xl mx-auto px-4 py-4"><div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">1. Geometria</h2><div className="space-y-1.5">{Object.entries(GEOMETRIES).map(function(entry){var k=entry[0],g=entry[1];return(<button key={k} onClick={function(){setSelectedType(k);}} className={"w-full text-left p-2.5 rounded-lg border-2 text-sm "+(selectedType===k?'border-blue-500 bg-blue-50':'border-gray-200 hover:border-gray-300')}><div className="font-medium" style={{color:g.color}}>{g.name}</div><div className="text-xs text-gray-500">{g.desc}</div></button>);})}</div></div></div>
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">2. Dimensiuni</h2><ParamSliders /><div className="mt-3"><label className="text-xs text-gray-500">Vf (%)</label><div className="flex items-center gap-2"><input type="range" min={0.1} max={1.5} step={0.05} value={vf} onChange={function(e){setVf(parseFloat(e.target.value));}} className="flex-1"/><span className="text-sm font-mono w-12 text-right">{vf.toFixed(2)}%</span></div></div></div></div>
        <div className="space-y-3"><div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">3. Dozaj</h2><div className="space-y-3">
          <div className="bg-blue-50 rounded-lg p-3"><div className="text-xs text-blue-600 font-medium">Per metru cub</div><div className="text-lg font-bold text-blue-800">{Math.round(nFibersPerM3).toLocaleString()} fibre</div><div className="text-sm text-blue-700">{massPerM3.toFixed(2)} kg/m3</div></div>
          <div className="bg-green-50 rounded-lg p-3"><div className="text-xs text-green-600 font-medium">Per epruveta</div><div className="text-lg font-bold text-green-800">{Math.round(nFibersPerSpec).toLocaleString()} fibre</div><div className="text-sm text-green-700">{massPerSpec.toFixed(1)} g</div></div>
          {geo.dosageRange&&<div className="bg-purple-50 border border-purple-200 rounded-lg p-3"><div className="text-xs text-purple-700 font-medium">Dozaj Sika recomandat</div><div className="text-sm font-bold text-purple-800 mt-1">{geo.dosageRange}</div></div>}
        </div></div>
        <div className="bg-white rounded-xl shadow p-4"><h2 className="text-sm font-bold text-gray-700 mb-3">4. Beneficii</h2>
          <BarChart data={[{label:'Compresiune',value:imp.compressive*(vf/0.3),color:'#2166AC'},{label:'Incovoiere',value:imp.flexural*(vf/0.3),color:'#4DAF4A'},{label:'Intindere',value:imp.tensile*(vf/0.3),color:'#FF7F00'},{label:'En. post-fis.',value:imp.energy*(vf/0.3),color:'#E41A1C'}]} maxVal={300} label={"La Vf="+vf.toFixed(2)+"%"}/>
        </div></div>
      </div></main></div>);
}


  
  
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
